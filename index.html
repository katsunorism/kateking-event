<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>【カテキンコミュニティ】イベント一覧</title>
  <style>
    :root { --primary-color: #004bb1; --accent-color: #ff9800; --bg-color: #f4f7f9; }
    body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; background: var(--bg-color); margin: 0; padding: 10px; color: #333; }
    .container { max-width: 1100px; margin: 0 auto; }
    h1 { color: var(--primary-color); font-size: 20px; text-align: center; margin-bottom: 15px; }
    .month-nav { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
    .month-nav button { background: var(--primary-color); color: white; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; }
    .month-nav span { font-size: 18px; font-weight: bold; color: var(--primary-color); min-width: 130px; text-align: center; }
    .event-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 30px; table-layout: fixed; touch-action: pan-y; }
    .event-table th { background: #e8eef8; color: var(--primary-color); padding: 10px 8px; font-size: 12px; text-align: left; border-bottom: 2px solid #d0d8ee; }
    .event-table td { padding: 10px 8px; font-size: 14px; border-bottom: 1px solid #eee; vertical-align: middle; }
    .col-place { width: 80px; font-weight: bold; color: var(--primary-color); }
    .col-date  { width: 90px; font-weight: bold; }
    .col-time  { width: 65px; color: #666; font-size: 12px; }
    .col-title-wrap { cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: pan-y; }
    .col-title { font-weight: bold; color: var(--primary-color); text-decoration: underline; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .col-reg   { width: 80px; color: #888; font-size: 12px; }
    .col-link  { width: 160px; text-align: center; }
    .mobile-time { display: none; font-size: 10px; color: #666; margin-top: 2px; }
    .desc-row { display: none; background: #f9f9f9; }
    .desc-content { padding: 15px; border-left: 4px solid var(--accent-color); white-space: pre-wrap; font-size: 13px; color: #444; line-height: 1.6; overflow-y: visible; touch-action: pan-y; }
    .btn-url, .btn-gcal { display: inline-block; padding: 4px 8px; border-radius: 4px; text-decoration: none; font-size: 10px; font-weight: bold; margin: 2px; }
    .btn-url { background: var(--accent-color); color: white; }
    .btn-gcal { background: #34a853; color: white; }
    .sat { color: #1565c0; }
    .sun { color: #c62828; }
    @media (max-width: 768px) {
      .col-reg, .col-time { display: none; }
      .event-table th:nth-child(3), .event-table th:nth-child(5) { display: none; }
      .col-place { width: 55px; font-size: 11px; }
      .col-date  { width: 75px; font-size: 12px; }
      .col-link  { width: 85px; }
      .mobile-time { display: block; }
      .btn-gcal span { display: none; }
      .btn-gcal::after { content: "📅登録"; }
      .col-title { font-size: 13px; white-space: normal; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; text-decoration: none; border-bottom: 1px dotted var(--primary-color); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>【カテキンコミュニティ】イベント一覧</h1>
    <div class="month-nav">
      <button id="btn-prev">◀ 前月</button>
      <span id="month-label"></span>
      <button id="btn-next">翌月 ▶</button>
    </div>
    <div id="event-list"></div>
  </div>

  <script>
    // --- 設定項目 ---
    const SPREADSHEET_ID = '1VSBA2YXTUODr4qsg6JiGdJGItUN9xLPz6u8kAkldqVs';
    const SHEET_NAME = 'フォームの回答 1'; 
    const DOW = ['日','月','火','水','木','金','土'];

    let currentYear  = new Date().getFullYear();
    let currentMonth = new Date().getMonth() + 1;
    let allDataCache = []; 

    function pad(n) { return String(n).padStart(2, '0'); }
    function toGcalDate(dt) {
      if (!dt || isNaN(dt.getTime())) return '';
      return dt.getFullYear() + pad(dt.getMonth()+1) + pad(dt.getDate()) + 'T' + pad(dt.getHours()) + pad(dt.getMinutes()) + '00';
    }
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str.toString()));
      return div.innerHTML;
    }

    function updateMonthLabel() {
      document.getElementById('month-label').textContent = currentYear + '年 ' + currentMonth + '月';
    }

    async function load() {
      const listDiv = document.getElementById('event-list');
      listDiv.innerHTML = '<div style="text-align:center;padding:50px;color:#666;">読み込み中...</div>';
      
      try {
        if (allDataCache.length === 0) {
          const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
          const response = await fetch(url);
          const text = await response.text();
          
          const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/);
          if (!match) throw new Error('Invalid JSONP response');
          
          const json = JSON.parse(match[1]);
          allDataCache = parseSheetData(json.table);
        }
        filterAndRender();
      } catch (err) {
        listDiv.innerHTML = '<div style="color:red;padding:20px;">データ取得エラー: ' + escapeHtml(err.message) + '</div>';
      }
    }

    function parseSheetData(table) {
      if (!table || !table.rows) return [];
      return table.rows.map(row => ({
        timestamp: row.c[0] ? row.c[0].v : '',
        registrant: row.c[1] ? (row.c[1].v || '') : '', 
        title: row.c[2] ? (row.c[2].v || '') : '',      
        dateKey: row.c[3] ? formatDate(row.c[3].v) : '', 
        startTime: row.c[4] ? (row.c[4].v || '終日') : '終日', 
        location: row.c[5] ? (row.c[5].v || '') : '',   
        url: row.c[6] ? (row.c[6].v || '') : '',        
        description: row.c[7] ? (row.c[7].v || '') : '' 
      }));
    }

    function formatDate(val) {
      if (!val) return '';
      const str = String(val);

      // ① Googleの内部Date形式 "Date(2026,4,23)" の場合
      if (str.includes('Date')) {
        const parts = str.match(/\d+/g);
        return `${parts[0]}-${pad(parseInt(parts[1])+1)}-${pad(parts[2])}`;
      }

      // ② 日本語混じりの文字列 "2026年5月23日(土)..." の場合（追加）
      const jpMatch = str.match(/(\d{4})[年/-](\d{1,2})[月/-](\d{1,2})/);
      if (jpMatch) {
        return `${jpMatch[1]}-${pad(jpMatch[2])}-${pad(jpMatch[3])}`;
      }

      return str;
    }

    function filterAndRender() {
      const ymPrefix = `${currentYear}-${pad(currentMonth)}`;
      const filtered = allDataCache.filter(ev => ev.dateKey && ev.dateKey.startsWith(ymPrefix));
      filtered.sort((a, b) => a.dateKey.localeCompare(b.dateKey));
      render(filtered);
    }

    function toggleDesc(id) {
      const el = document.getElementById(id);
      if(!el) return;
      el.style.display = (el.style.display !== 'table-row') ? 'table-row' : 'none';
      if (document.activeElement instanceof HTMLElement) document.activeElement.blur();
    }

    function render(events) {
      const listDiv = document.getElementById('event-list');
      listDiv.innerHTML = '';
      if (events.length === 0) {
        listDiv.innerHTML = '<div style="text-align:center;padding:50px;color:#666;">この月のイベントはありません。</div>';
        return;
      }
      const table = document.createElement('table');
      table.className = 'event-table';
      table.innerHTML = '<thead><tr><th class="col-place">場所</th><th class="col-date">日時</th><th class="col-time">時刻</th><th>内容</th><th class="col-reg">投稿者</th><th class="col-link">リンク</th></tr></thead>';
      const tbody = document.createElement('tbody');

      events.forEach((ev, k) => {
        const d = new Date(ev.dateKey.replace(/-/g, '/'));
        const dowIndex = d.getDay();
        const dowClass = dowIndex === 0 ? 'sun' : (dowIndex === 6 ? 'sat' : '');
        const timeStr = (ev.startTime && ev.startTime !== '終日') ? ev.startTime : '00:00';
        const startD = new Date(ev.dateKey.replace(/-/g, '/') + ' ' + timeStr);
        const endD = new Date(startD.getTime() + 3600000);
        const gcalUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(ev.title)}&dates=${toGcalDate(startD)}/${toGcalDate(endD)}&details=${encodeURIComponent(ev.description)}&location=${encodeURIComponent(ev.location)}`;

        const tr = document.createElement('tr');
        const tdPlace = document.createElement('td'); tdPlace.className = 'col-place'; tdPlace.textContent = ev.location || 'Web'; tr.appendChild(tdPlace);
        const tdDate = document.createElement('td'); tdDate.className = 'col-date';
        const divD = document.createElement('div'); divD.textContent = `${d.getMonth()+1}/${d.getDate()}`;
        const spanD = document.createElement('span'); if(dowClass) spanD.className = dowClass; spanD.textContent = `(${DOW[dowIndex]})`;
        divD.appendChild(spanD); tdDate.appendChild(divD);
        const divMT = document.createElement('div'); divMT.className = 'mobile-time'; divMT.textContent = ev.startTime; tdDate.appendChild(divMT);
        tr.appendChild(tdDate);
        const tdTime = document.createElement('td'); tdTime.className = 'col-time'; tdTime.textContent = ev.startTime; tr.appendChild(tdTime);
        const tdContent = document.createElement('td'); tdContent.className = 'col-title-wrap';
        const divT = document.createElement('div'); divT.className = 'col-title'; divT.textContent = ev.title; tdContent.appendChild(divT);
        tr.appendChild(tdContent);
        const tdReg = document.createElement('td'); tdReg.className = 'col-reg'; tdReg.textContent = ev.registrant; tr.appendChild(tdReg);
        const tdAction = document.createElement('td'); tdAction.className = 'col-link';
        if (/^https?:\/\//i.test(ev.url)) {
          const a = document.createElement('a'); a.href = encodeURI(ev.url); a.target = '_blank'; a.className = 'btn-url'; a.textContent = '詳細';
          tdAction.appendChild(a);
        }
        const g = document.createElement('a'); g.href = gcalUrl; g.target = '_blank'; g.className = 'btn-gcal';
        const s = document.createElement('span'); s.textContent = '📅カレンダーに登録'; g.appendChild(s);
        tdAction.appendChild(g); tr.appendChild(tdAction);
        const descId = 'desc-' + k;
        tdContent.addEventListener('click', () => toggleDesc(descId));
        tbody.appendChild(tr);
        const descTr = document.createElement('tr'); descTr.id = descId; descTr.className = 'desc-row';
        const tdDsc = document.createElement('td'); tdDsc.colSpan = 6;
        const divDsc = document.createElement('div'); divDsc.className = 'desc-content'; divDsc.textContent = ev.description;
        tdDsc.appendChild(divDsc); descTr.appendChild(tdDsc);
        tbody.appendChild(descTr);
      });
      table.appendChild(tbody);
      listDiv.appendChild(table);
    }

    document.getElementById('btn-prev').onclick = () => { currentMonth--; if (currentMonth < 1) { currentMonth = 12; currentYear--; } updateMonthLabel(); filterAndRender(); };
    document.getElementById('btn-next').onclick = () => { currentMonth++; if (currentMonth > 12) { currentMonth = 1; currentYear++; } updateMonthLabel(); filterAndRender(); };
    updateMonthLabel(); load();
  </script>
</body>
</html>
